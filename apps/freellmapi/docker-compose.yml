services:
  freellmapi:
    image: ghcr.io/tashfeenahmed/freellmapi:latest
    container_name: freellmapi
    restart: unless-stopped
    volumes:
      - ${APP_DATA_DIR}/data/freellmapi-data:/app/server/data
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=${PORT:-3001}
    healthcheck:
      test:
        - CMD
        - node
        - "-e"
        - fetch('http://127.0.0.1:3001/api/ping').then((res) => { if (!res.ok) process.exit(1); }).catch(() => process.exit(1));
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    x-runtipi:
      is_main: true
      internal_port: 3001
x-runtipi:
  schema_version: 2
